kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend
  namespace: expense
  labels:
    app: backend
    tier: backend
    project: expense
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      tier: backend
      project: expense

  template:
    metadata:
      labels:
        app: backend
        tier: backend
        project: expense
    spec:
      containers:
      - name: backend
        image: sumanth7696/backend:1.0.0

---

kind: Service
apiVersion: v1
metadata:
  name: backend
  namespace: expense
spec:
  selector:
    app: backend
    tier: backend
    project: expense
  ports:
  - port: 8080
    targetPort: 8080